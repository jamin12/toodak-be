# 로컬 개발용 PostgreSQL.
# 사용:
#   docker compose up -d        # 백그라운드 기동
#   docker compose ps           # 상태 확인
#   docker compose logs -f db   # 로그 확인
#   docker compose down         # 컨테이너 정리 (볼륨 유지)
#   docker compose down -v      # 볼륨까지 삭제
services:
  db:
    image: postgres:17-alpine
    container_name: toodak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: toodak
      POSTGRES_PASSWORD: toodak
      POSTGRES_DB: toodak
      TZ: Asia/Seoul
    # 호스트 포트 15432로 노출 (기본 5432는 다른 PostgreSQL 인스턴스와 충돌 가능).
    ports:
      - "15432:5432"
    volumes:
      - toodak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toodak -d toodak"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  toodak-db-data:
