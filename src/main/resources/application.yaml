spring:
    application:
        name: toodak-be
    profiles:
        # 로컬 실행 기본은 dev. 운영은 SPRING_PROFILES_ACTIVE=prod 로 주입.
        active: ${SPRING_PROFILES_ACTIVE:dev}
    # 자체 JWT 인증을 사용하므로 Spring Security의 기본 InMemory user(랜덤 비밀번호 로그) 자동 등록 제외.
    # Spring Boot 4.0부터 spring-boot-security 모듈로 분리되어 패키지 경로가 변경됨
    # (이전: org.springframework.boot.autoconfigure.security.servlet.*).
    autoconfigure:
        exclude:
            - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
    jpa:
        # Flyway가 스키마를 관리. JPA는 검증만.
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                jdbc:
                    time_zone: Asia/Seoul
    flyway:
        # Spring 시작 시 자동 마이그레이션 차단. 명시적으로 `./gradlew flywayMigrate` 실행 필요.
        enabled: false

jwt:
    access-ttl: PT15M
    refresh-ttl: P30D

google:
    # Google OAuth 웹 애플리케이션 클라이언트 ID. id_token aud 검증에 사용 (비밀값 아님).
    audience: ${GOOGLE_AUDIENCE:106470228002-9vc5tqrv8fdiaqusqslt48iv4jmv1pqb.apps.googleusercontent.com}

# Spring Security 공개 경로. Ant 패턴(와일드카드) 지원.
# 환경별 추가가 필요하면 application-{profile}.yaml에서 override.
app:
    security:
        public-paths:
            - /api/v1/auth/google
            - /api/v1/auth/refresh
            - /api/v1/auth/logout
            # Spring Boot 기본 에러 경로. GlobalExceptionHandler가 못 잡는 케이스(필터 단계 예외 등)에서
            # DispatcherServlet이 /error로 forward하므로 통과시켜야 한다.
            - /error
            - /error/**
            # Swagger / OpenAPI 문서 경로 (Springdoc)
            - /v3/api-docs
            - /v3/api-docs/**
            - /swagger-ui.html
            - /swagger-ui/**

# Springdoc OpenAPI 설정.
# - default-produces-media-type: 모든 응답을 JSON 으로 표시.
# - api-docs/swagger-ui 경로는 기본값 사용 (/v3/api-docs, /swagger-ui/index.html).
springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html
        operations-sorter: alpha
        tags-sorter: alpha
    default-produces-media-type: application/json
