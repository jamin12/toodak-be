# 로컬 개발 프로파일. 로컬 PostgreSQL + 디버그 로깅 + SQL 포맷팅.
spring:
    datasource:
        url: ${DB_URL:jdbc:postgresql://localhost:15432/toodak}
        username: ${DB_USERNAME:toodak}
        password: ${DB_PASSWORD:toodak}
        driver-class-name: org.postgresql.Driver
    jpa:
        properties:
            hibernate:
                format_sql: true

jwt:
    # 로컬 전용 시크릿. 운영 사용 금지.
    secret: ${JWT_SECRET:local-dev-secret-do-not-use-in-production-please-replace-min-256-bits-required}

logging:
    level:
        org.toodakbe: DEBUG
        org.hibernate.SQL: DEBUG
